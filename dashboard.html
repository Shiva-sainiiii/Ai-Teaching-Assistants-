<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duke AI Dashboard</title>

  <link rel="stylesheet" href="css/styles.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
        body {
      background: radial-gradient(circle at top right, #0f172a, #020617);
      font-family: 'Inter', sans-serif;
      overflow-y: auto !important; /* 👈 Isse scrolling chalu ho jayegi */
      height: auto !important;     /* 👈 Isse page apni poori height le lega */
    }


    .dashboard {
      padding: 20px;
      color: white;
      max-width: 1200px;
      margin: auto;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .back-btn {
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-glass);
      color: white;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .back-btn:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-1px);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      padding: 24px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      background: var(--bg-glass);
      border: 1px solid var(--border-glass);
      text-align: center;
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: var(--primary);
    }

    .card h3 {
      margin-bottom: 12px;
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .card p {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-main);
    }

    .chart-container {
      background: var(--bg-glass);
      border: 1px solid var(--border-glass);
      padding: 24px;
      border-radius: 16px;
      height: 400px; /* Graph ko height fix di gayi hai */
      position: relative;
    }

    .chart-title {
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-main);
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 40px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
    }
    
    canvas {
      max-height: 320px; /* Chart canvas height boundary */
    }
  </style>
</head>
<body>

  <div class="dashboard">

    <div class="top-bar">
      <h1>📊 Smart Dashboard</h1>
      <a href="index.html" class="back-btn">⬅ Back</a>
    </div>

    <div class="cards">

      <div class="card">
        <h3>📚 PDFs Uploaded</h3>
        <p id="pdfCount">0</p>
      </div>

      <div class="card">
        <h3>🧠 Topics Learned</h3>
        <p id="topicsCount">0</p>
      </div>

      <div class="card">
        <h3>⏱ Study Time</h3>
        <p id="studyTime">0 min</p>
      </div>

    </div>

    <div class="chart-container">
      <div class="chart-title">📈 Quiz Performance</div>

      <div id="emptyState" class="empty-state" style="display:none;">
        No quiz data available yet. Solve a quiz to see performance 📊
      </div>

      <canvas id="quizChart"></canvas>
    </div>

  </div>

  <script src="js/dashboard.js"></script>

</body>
</html>
