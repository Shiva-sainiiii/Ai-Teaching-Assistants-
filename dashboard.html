<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duke AI Dashboard</title>

  <link rel="stylesheet" href="css/styles.css">

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background: #0f172a;
      font-family: sans-serif;
    }

    .dashboard {
      padding: 20px;
      color: white;
      max-width: 1200px;
      margin: auto;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .back-btn {
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 14px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.08);
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card h3 {
      margin-bottom: 10px;
      font-size: 16px;
      color: #cbd5f5;
    }

    .card p {
      font-size: 28px;
      font-weight: bold;
    }

    .chart-container {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 15px;
    }

    .chart-title {
      margin-bottom: 15px;
      font-size: 18px;
      color: #cbd5f5;
    }

    .empty-state {
      text-align: center;
      opacity: 0.7;
      padding: 20px;
    }
  </style>
</head>
<body>

  <div class="dashboard">

    <!-- 🔝 TOP BAR -->
    <div class="top-bar">
      <h1>📊 Smart Dashboard</h1>
      <a href="index.html" class="back-btn">⬅ Back</a>
    </div>

    <!-- 📊 CARDS -->
    <div class="cards">

      <div class="card">
        <h3>📚 PDFs Uploaded</h3>
        <p id="pdfCount">0</p>
      </div>

      <div class="card">
        <h3>🧠 Topics Learned</h3>
        <p id="topicsCount">0</p>
      </div>

      <div class="card">
        <h3>⏱ Study Time</h3>
        <p id="studyTime">0 min</p>
      </div>

    </div>

    <!-- 📈 CHART -->
    <div class="chart-container">
      <div class="chart-title">📈 Quiz Performance</div>

      <!-- Empty state -->
      <div id="emptyState" class="empty-state" style="display:none;">
        No quiz data available yet. Solve a quiz to see performance 📊
      </div>

      <canvas id="quizChart"></canvas>
    </div>

  </div>

  <script src="js/dashboard.js"></script>

</body>
</html>
